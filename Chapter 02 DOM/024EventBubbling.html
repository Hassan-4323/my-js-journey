<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html,body{
            width: 100%;
            height: 100%;
        }

        #main{
            width: 100%;
            height: 100%;
            background-color: #222;
        }

        #nav{
            display: flex;
            align-items: center;
            justify-content: space-around;
            width: 100%;
            height: 100px;
            background-color: #444;
        }

        a{
            color: white !important;
        }

        button{
            padding: 10px 20px;
            background-color: red;
            color: white;
            border-radius: 5px;
            border: none;
            font-weight: 600;
            font-size: 18px;
        }
    </style>
</head>
<body>
    <div id="main">
        <div id="nav">
            <a href="">Home</a>
            <a href="">About</a>
            <button>Click and Follow</button>
        </div>
    </div>
    
    <script src="024EventBubbling.js"></script>
</body>
</html>
