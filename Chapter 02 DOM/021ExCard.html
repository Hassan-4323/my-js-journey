<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            /* font-family: "Helvetica Now Display"; */
            font-family: "Gilroy";
            box-sizing: border-box;
        }

        html,
        body {
            width: 100%;
            height: 100%;
        }

        #main {
            width: 100%;
            height: 100%;
            background-color: #c58888;
        }
         input{
            display: block;
            padding: 10px;
            width: 300px;
         }

         .card{
            background-color: black;
            width: 300px;
            color: #fff;
            padding: 20px;
            margin-top: 40px;
            border: 1px solid #e3e3e3;
            border-radius: 10px;
            display: inline-block;
         }
         .card p{
            font-size: 12px;
            margin-top: 10px;
         }
         .card h5{
            margin-top: 3px;
         }
         .profile{
            width: 50px;
            height: 50px;
            border-radius: 50%;
            margin-bottom: 7px;
            overflow: hidden;
         }
         .profile img{
            width: 100%;
            height: 100%;
            object-fit: cover;
         }
    </style>
</head>
<body>
    
    <div id="main">
        <form action="">
            <input type="text" placeholder="profile-pic">
            <input type="text" placeholder="name">
            <input type="text" placeholder="occupation">
            <input type="text" placeholder="info">
            <input type="submit">
        </form>

    </div>


    <script src="021ExCard.js"></script>
</body>
</html>
