<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Email Password Validator</title>
    <link rel="stylesheet" href="031EmailPasswordValid.css">
</head>

<body>

    <div class="container">
        <form autocomplete="off" id="form">
            <h2>Login Form</h2>

            <div class="input-group">
                <label>Email</label>
                <input type="text" id="email" placeholder="Enter your email">
                <small class="error" id="emailError">Invalid email</small>
            </div>

            <div class="input-group">
                <label>Password</label>
                <input type="password" id="password" placeholder="Enter password">
                <small class="error" id="passError">Password must be 6+ characters</small>
            </div>

            <button type="submit">Login</button>
            <div id="result"></div>
        </form>
    </div>

    <script src="031EmailPasswordValid.js"></script>
</body>

</html>
